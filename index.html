<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preload" href="/fonts/Jost-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Jost-Light.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Cormorant-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <title>Wongani Siwande — Taste Direction</title>
  </head>
  <body>
    <!--
      Netlify Forms detection. This hidden static form lets Netlify register the
      "inquiry" form at build time; the visible form is React-rendered and submits
      to it via AJAX (see src/pages/Contact.tsx).
    -->
    <form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="services" />
      <textarea name="message"></textarea>
      <input type="file" name="brief" />
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
